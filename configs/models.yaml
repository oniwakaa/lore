# Model registry — paths, quant types, roles
# All paths relative to project root
#
# The orchestrator model: user-set, NEVER auto-changed.
# Worker models: auto-selected from live benchmarks, user approves downloads.

# Orchestrator model — locked, never auto-changed
orchestrator:
  model: Ornith-1.0-9B
  role: primary
  port: 19000
  path: models/ornith-1.0-9b-Q4_K_M.gguf
  quant: Q4_K_M
  source: deepreinforce-ai/Ornith-1.0-9B-GGUF
  locked: true

# Auto-selection: LORE picks worker models from live benchmarks
auto_select: true
size_class: medium  # "small" (<3B) or "medium" (<10B)
check_upgrades_on_start: false
upgrade_check_interval_hours: 168  # weekly

# Leaderboard scanner config
leaderboard:
  cache_ttl_hours: 24
  hf_token: null
  min_improvement_pct: 5.0  # only flag >5% improvements

# Fallback task mapping (used when auto_select=false or no scores available)
task_mapping:
  classification: specialist
  extraction: specialist
  summarization: specialist
  code_gen: primary
  testing: primary
  documentation: specialist
  math: primary
  planning: primary
  review: primary

# --- Legacy model config (kept for ModelServer compatibility) ---

primary:
  name: Ornith-1.0-9B
  role: primary
  port: 19000
  path: models/ornith-1.0-9b-Q4_K_M.gguf
  quant: Q4_K_M
  file_size_gb: 5.24  # actual, 5.02 BPW
  rss_turbo4_gb: 5.57  # measured at 16K ctx, turbo4 KV, single slot
  rss_f16_gb: 5.87  # measured at 16K ctx, f16 KV, single slot
  parallel_slots: 3  # -np flag: 3 parallel inference slots for concurrent subtasks
  context: 262144
  cores: [0, 1, 2, 3]  # performance cores on M4
  architecture: qwen35  # hybrid SSM: 8 attention layers + 24 SSM layers
  attention_layers: [3, 7, 11, 15, 19, 23, 27, 31]  # every 4th
  full_attention_interval: 4
  n_params: 8.95B
  vocab: 248320
  imatrix: embedded  # 401 chunks, 248 entries
  source: deepreinforce-ai/Ornith-1.0-9B-GGUF
  license: MIT

specialist:
  name: Falcon-H1-1.5B
  role: specialist
  port: 19001
  path: models/Falcon-H1-1.5B-Instruct-Q4_K_M.gguf
  quant: Q4_K_M
  file_size_gb: 0.88  # actual
  rss_turbo4_gb: 1.14  # measured at 16K ctx, turbo4 KV, single slot
  rss_f16_gb: 1.37  # measured at 16K ctx, f16 KV, single slot
  context: 131072
  cores: [4, 5, 6, 7, 8, 9]  # efficiency cores on M4
  architecture: hybrid_ssm  # 2 attention heads
  source: tiiuae/Falcon-H1-1.5B-Instruct-GGUF
  license: Falcon License 2.0

# llama.cpp binary from TurboQuant fork
engine:
  cli_path: external/llama-cpp-turboquant/build/bin/llama-cli
  server_path: external/llama-cpp-turboquant/build/bin/llama-server
  metal: true
  turboquant: true

# Default inference settings
defaults:
  context_size: 32768
  kv_cache_type: turbo4  # options: turbo4, q8_0, q4_0, fp16
  flash_attention: true
  gpu_layers: 999  # offload all to Metal
  threads: 4
  tokenizer_source: local  # local|http — local avoids per-request /tokenize round-trips
  host_cache: false  # -cram: offload idle-slot KV cache to host RAM instead of unified memory
  host_cache_mb: 8192  # max host cache size in MiB, only used when host_cache is true
  speculative_decoding: true  # ngram-simple for specialist (no draft model needed)

embeddings:
  name: nomic-embed-text-v1.5
  port: 19002
  path: models/nomic-embed-text-v1.5.f16.gguf
  context: 8192
  embedding_dim: 768

multimodal:
  name: gemma-4-e4b
  port: 19003
  path: models/gemma-4-e4b-Q4_K_M.gguf
  quant: Q4_K_M
  expected_size_gb: 5.0
  context: 16384
  swap_ttl_seconds: 120

context_budget:
  system_prompt: 512
  retrieved_memories: 1024
  working_context: 4096
  user_input: 2048
  generation_headroom: 4096
