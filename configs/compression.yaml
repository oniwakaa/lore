# LLMLingua-2 prompt compression config
enabled: false  # opt-in
model_path: microsoft/llmlingua-2-bert-base-multilingual-cased-meetingbank
device_map: cpu
ratio: 0.5
min_turns: 10  # don't compress short sessions — overhead > savings
preserve_recent_turns: 3  # never compress the last N turns (x2 messages)
