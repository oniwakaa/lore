# Orchestration engine config
enabled: true
complexity_threshold: 0.6  # above this, attempt decomposition
max_subtasks: 3  # cap at 3: one wave with 3 parallel slots
parallel_slots: 3  # concurrent inference slots on primary model

# Task classifier — LLM-based, default. Uses specialist model for NLU.
# Falls back to heuristic (complexity.estimate) on failure or invalid JSON.
classifier:
  enabled: true
  model: specialist
  max_tokens: 256
  temperature: 0.1

planning:
  model: primary
  max_tokens: 2048
  temperature: 0.2

execution:
  # Per-subtask defaults (overridden by TaskPlan)
  default_context_budget: 4096
  default_max_tokens: 2048
  specialist_fallback: true  # fall back to primary on specialist failure

aggregation:
  model: primary
  max_tokens: 4096
  temperature: 0.5

memory:
  store_subtask_summaries: true  # store each subtask result in episodic memory
  store_plan: true  # store the decomposition plan for future reference

dynamic_model_lifecycle:
  enabled: true
  offload_threshold: 0.8  # offload specialist if >80% of subtasks are primary-only
